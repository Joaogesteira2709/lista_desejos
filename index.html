<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Quicklist</title>
</head>

<body>
    <header>
        <img src="./img/logo.png" alt="Logo do Quicklist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" id="item" placeholder="Adicione um novo item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="lista">

            <div class="item">
                <div>
                    <input type="checkbox" id="item-1">
                    <label for="item-1">Pão de forma</label>
                </div>

                <button>
                    <img src="./img/trash-icon.svg" alt="imagem lixo">
                </button>
            </div>

            <div class="item">
                <div>
                    <input type="checkbox" id="item-2">
                    <label for="item-2">Café preto</label>
                </div>

                <button>
                    <img src="./img/trash-icon.svg" alt="imagem lixo">
                </button>
            </div>

            <div class="item">
                <div>
                    <input type="checkbox" id="item-3">
                    <label for="item-3">Suco de laranja</label>
                </div>

                <button>
                    <img src="./img/trash-icon.svg" alt="imagem lixo">
                </button>
            </div>
        </section>

    </main>
</body>

</html>
